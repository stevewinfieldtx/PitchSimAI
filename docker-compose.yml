version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/pitchsim
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/pitchsim
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_MODEL1_ID=${OPENROUTER_MODEL1_ID:-}
      - OPENROUTER_MODEL2_ID=${OPENROUTER_MODEL2_ID:-}
      - OPENROUTER_MODEL3_ID=${OPENROUTER_MODEL3_ID:-}
      - OPENROUTER_MODEL4_ID=${OPENROUTER_MODEL4_ID:-}
      - OPENROUTER_MODEL5_ID=${OPENROUTER_MODEL5_ID:-}
      - OPENROUTER_CONCURRENCY_PER_MODEL=${OPENROUTER_CONCURRENCY_PER_MODEL:-10}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=pitchsim
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
