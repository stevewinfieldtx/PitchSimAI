version: "3.8"

services:
  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/pitchsim
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/pitchsim
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL_ID=${OPENROUTER_MODEL_ID:-openai/gpt-4o-mini}
      - OPENROUTER_MODEL1_ID=${OPENROUTER_MODEL1_ID:-}
      - OPENROUTER_MODEL2_ID=${OPENROUTER_MODEL2_ID:-}
      - OPENROUTER_MODEL3_ID=${OPENROUTER_MODEL3_ID:-}
      - OPENROUTER_MODEL4_ID=${OPENROUTER_MODEL4_ID:-}
      - OPENROUTER_MODEL5_ID=${OPENROUTER_MODEL5_ID:-}
      - OPENROUTER_CONCURRENCY_PER_MODEL=${OPENROUTER_CONCURRENCY_PER_MODEL:-10}
      - REDIS_URL=redis://redis:6379/0
      - MIROFISH_API_URL=http://mirofish:5001
      - MIROFISH_NUM_AGENTS=${MIROFISH_NUM_AGENTS:-50}
      - MIROFISH_NUM_ROUNDS=${MIROFISH_NUM_ROUNDS:-20}
      - DEBUG=${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mirofish:
        condition: service_started
    restart: unless-stopped

  # ── MiroFish: Swarm Intelligence Simulation Engine ──
  # Spawns thousands of autonomous AI agents that simulate buyer behavior.
  # PitchProofAI sends pitches to MiroFish via REST API (port 5001).
  # See: https://github.com/666ghj/MiroFish
  mirofish:
    build:
      context: ./mirofish
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - LLM_API_KEY=${OPENROUTER_API_KEY:-}
      - LLM_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - LLM_MODEL_NAME=${OPENROUTER_MODEL_ID:-openai/gpt-4o-mini}
      - ZEP_API_KEY=${ZEP_API_KEY:-}
      - BOOST_LLM_API_KEY=${OPENROUTER_API_KEY:-}
      - BOOST_LLM_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - BOOST_LLM_MODEL_NAME=${OPENROUTER_MODEL_ID:-openai/gpt-4o-mini}
    volumes:
      - mirofish_data:/app/backend/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=pitchsim
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
  mirofish_data:

